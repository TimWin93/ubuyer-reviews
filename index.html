<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UBuyer — Контент Завод</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#e8e8e8;min-height:100vh}

/* picker */
.picker-overlay{position:fixed;inset:0;background:#0f0f0f;z-index:300;display:flex;align-items:center;justify-content:center}
.picker-box{text-align:center;padding:40px}
.picker-logo{font-size:28px;font-weight:800;color:#fff;margin-bottom:8px}
.picker-logo span{color:#ff6b35}
.picker-sub{color:#666;font-size:15px;margin-bottom:40px}
.picker-users{display:flex;gap:16px;justify-content:center}
.picker-user{width:110px;padding:24px 16px;border-radius:16px;border:2px solid #2a2a2a;background:#1a1a1a;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:12px}
.picker-user:hover{border-color:#ff6b35;transform:translateY(-2px)}
.picker-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff}
.picker-name{font-size:15px;font-weight:600;color:#fff}

/* header */
header{background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:10px 20px;position:sticky;top:0;z-index:100}
.hrow1{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.logo{font-weight:800;font-size:16px;color:#fff;white-space:nowrap}
.logo span{color:#ff6b35}
.tabs{display:flex;gap:2px;background:#111;padding:3px;border-radius:10px;border:1px solid #222}
.tab-btn{padding:4px 12px;border-radius:7px;border:none;background:transparent;color:#666;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.tab-btn.active{background:#ff6b35;color:#fff}
.session-badge{font-size:12px;color:#666;background:#111;padding:4px 10px;border-radius:6px;border:1px solid #2a2a2a}
.stats{display:flex;gap:12px;font-size:12px;color:#666}
.stat strong{color:#ccc}
.ml-auto{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-add{padding:5px 13px;border-radius:8px;border:none;background:#ff6b35;color:#fff;cursor:pointer;font-size:12px;font-weight:600}
.btn-add:hover{background:#ff8552}
.user-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0}
.user-avatar:hover{opacity:.75}
.change-user{font-size:12px;color:#555;cursor:pointer;white-space:nowrap}
.change-user:hover{color:#aaa}
.hrow2{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.btn-f{padding:5px 12px;border-radius:16px;border:1px solid #333;background:transparent;color:#777;cursor:pointer;font-size:12px;transition:all .15s;white-space:nowrap}
.btn-f.active{background:#ff6b35;border-color:#ff6b35;color:#fff}
.divider{width:1px;height:18px;background:#2a2a2a;flex-shrink:0}
.btn-tag-f{padding:4px 10px;border-radius:12px;border:1px solid #2a2a2a;background:transparent;color:#555;cursor:pointer;font-size:11px;transition:all .15s}
.btn-tag-f.on{border-color:#a78bfa;color:#a78bfa;background:rgba(139,92,246,.1)}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;padding:16px 20px}
.empty{text-align:center;padding:80px 24px;color:#444;font-size:15px;grid-column:1/-1}

/* card */
.card{background:#1a1a1a;border-radius:12px;overflow:hidden;border:2px solid #2a2a2a;transition:border-color .15s}
.card[data-my="approved"]{border-color:#22c55e}
.card[data-my="maybe"]{border-color:#fbbf24}
.card[data-my="skip"]{border-color:#ef4444;opacity:.5}
.card[data-my="skip"]:hover{opacity:.85}
.thumb{position:relative;cursor:pointer}
.thumb img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#111}
.thumb-placeholder{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#fff}
.thumb-placeholder svg{opacity:.9}
.thumb-placeholder span{font-size:11px;opacity:.7;font-weight:600}
.thumb-badge{position:absolute;top:7px;left:7px;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.badge-shorts{background:#ff0050}
.badge-manual{background:#7c3aed}
.thumb-dur{position:absolute;bottom:6px;right:7px;background:rgba(0,0,0,.85);color:#fff;font-size:11px;padding:2px 6px;border-radius:4px}
.ref-type{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;margin-bottom:6px}
.ref-topic{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.25)}
.ref-format{background:rgba(14,165,233,.15);color:#38bdf8;border:1px solid rgba(14,165,233,.25)}
.ref-manual{background:rgba(124,58,237,.15);color:#c4b5fd;border:1px solid rgba(124,58,237,.25)}
.card-body{padding:11px}
.card-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{font-size:11px;color:#666;display:flex;justify-content:space-between;margin-bottom:8px}
.card-views{font-weight:600;color:#aaa}
.card-views.hot{color:#fbbf24}
.card-views.viral{color:#f87171}
.voters{display:flex;gap:5px;align-items:center;margin-bottom:8px;min-height:22px}
.v-chip{font-size:11px;padding:2px 7px;border-radius:10px;font-weight:600;opacity:.35}
.v-chip.active{opacity:1}
.v-chip.approved{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.v-chip.maybe{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.v-chip.skip{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.v-chip.none{background:#1f1f1f;color:#444;border:1px solid #2a2a2a}
.vote-row{display:flex;gap:6px;margin-bottom:8px}
.btn-vote{flex:1;padding:7px 4px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.btn-approved{background:#1a3a2a;color:#22c55e}
.btn-approved:hover,.btn-approved.mine{background:#22c55e;color:#fff}
.btn-maybe{background:#2a2618;color:#fbbf24}
.btn-maybe:hover,.btn-maybe.mine{background:#fbbf24;color:#000}
.btn-skip{background:#2a1a1a;color:#ef4444}
.btn-skip:hover,.btn-skip.mine{background:#ef4444;color:#fff}
.btn-yt{flex:0 0 auto;width:34px;border-radius:8px;border:1px solid #333;background:transparent;color:#777;cursor:pointer;font-size:13px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
.btn-yt:hover{border-color:#aaa;color:#fff}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;min-height:20px}
.tag-pill{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid #2a2a2a;color:#444;cursor:pointer;transition:all .12s;user-select:none}
.tag-pill.on{background:rgba(139,92,246,.15);color:#a78bfa;border-color:rgba(139,92,246,.4)}
.tag-pill:hover:not(.on){border-color:#444;color:#777}
.btn-comment{width:100%;padding:6px;border-radius:7px;border:1px solid #2a2a2a;background:transparent;color:#555;cursor:pointer;font-size:11px;text-align:left;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn-comment:hover{border-color:#444;color:#aaa}
.comment-dot{width:6px;height:6px;border-radius:50%;background:#ff6b35;display:none}
.comment-dot.has{display:inline-block}

/* comment modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#1a1a1a;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:560px;max-height:80vh;display:flex;flex-direction:column}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px}
.modal-title{font-size:14px;font-weight:600;line-height:1.4;color:#fff}
.modal-close{background:none;border:none;color:#555;cursor:pointer;font-size:20px;line-height:1;flex-shrink:0}
.modal-close:hover{color:#aaa}
.comments-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:14px;min-height:60px}
.comment-item{background:#111;border-radius:10px;padding:10px 12px}
.comment-author{font-size:11px;font-weight:700;margin-bottom:4px}
.comment-text{font-size:13px;color:#ccc;line-height:1.5}
.comment-time{font-size:10px;color:#444;margin-top:4px}
.no-comments{color:#444;font-size:13px;text-align:center;padding:20px}
.comment-form{display:flex;gap:8px}
.comment-input{flex:1;background:#111;border:1px solid #333;border-radius:10px;color:#e8e8e8;padding:10px 12px;font-size:13px;resize:none;height:40px;transition:height .15s;font-family:inherit}
.comment-input:focus{outline:none;border-color:#444;height:80px}
.comment-send{padding:0 14px;border-radius:10px;border:none;background:#ff6b35;color:#fff;cursor:pointer;font-weight:600;font-size:13px}
.comment-send:disabled{opacity:.4;cursor:default}

/* add video modal */
.add-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:210;align-items:center;justify-content:center;padding:16px}
.add-overlay.open{display:flex}
.add-box{background:#1c1c1c;border-radius:16px;padding:24px;width:100%;max-width:460px}
.add-box h3{font-size:16px;font-weight:700;margin-bottom:16px;color:#fff}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#888;margin-bottom:5px}
.field input{width:100%;background:#111;border:1px solid #333;border-radius:8px;color:#e8e8e8;padding:10px 12px;font-size:14px;font-family:inherit}
.field input:focus{outline:none;border-color:#555}
.field input::placeholder{color:#444}
.plat-hint{font-size:11px;margin-top:5px;padding:3px 8px;border-radius:5px;display:inline-block}
.plat-yt{background:rgba(255,0,0,.1);color:#f87171}
.plat-tt{background:#1a1a1a;color:#888}
.plat-ig{background:rgba(214,81,235,.1);color:#d451eb}
.plat-other{background:#1a1a1a;color:#666}
.preview-strip{display:flex;gap:10px;align-items:center;background:#111;border-radius:8px;padding:10px;margin-bottom:14px}
.preview-strip img{width:80px;height:45px;object-fit:cover;border-radius:5px;background:#222;flex-shrink:0}
.preview-strip-title{font-size:12px;color:#ccc;line-height:1.4}
.add-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:8px 16px;border-radius:8px;border:1px solid #333;background:transparent;color:#666;cursor:pointer;font-size:13px}
.btn-save{padding:8px 20px;border-radius:8px;border:none;background:#ff6b35;color:#fff;cursor:pointer;font-size:13px;font-weight:600}
.btn-save:disabled{opacity:.4;cursor:default}

/* content plan tab */
.plan-wrap{padding:20px;max-width:900px}
.plan-col{margin-bottom:28px}
.plan-col-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #2a2a2a}
.plan-col-label{font-size:13px;font-weight:700;color:#fff}
.plan-cnt{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.cnt-idea{background:rgba(96,165,250,.1);color:#60a5fa}
.cnt-work{background:rgba(251,191,36,.1);color:#fbbf24}
.cnt-shot{background:rgba(167,139,250,.1);color:#a78bfa}
.cnt-edit{background:rgba(52,211,153,.1);color:#34d399}
.cnt-pub{background:rgba(34,197,94,.1);color:#22c55e}
.plan-card{background:#1a1a1a;border-radius:10px;padding:12px;display:flex;gap:12px;margin-bottom:8px;border:1px solid #2a2a2a;align-items:flex-start}
.plan-thumb{width:90px;height:50px;object-fit:cover;border-radius:6px;background:#222;flex-shrink:0;cursor:pointer}
.plan-info{flex:1;min-width:0}
.plan-title{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plan-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.plan-sel{background:#111;border:1px solid #333;border-radius:6px;color:#ccc;padding:3px 8px;font-size:11px;cursor:pointer}
.plan-sel:focus{outline:none;border-color:#555}
.plan-date{background:#111;border:1px solid #333;border-radius:6px;color:#ccc;padding:3px 8px;font-size:11px}
.plan-date:focus{outline:none;border-color:#555}
.plan-empty{color:#444;font-size:13px;padding:4px 0 8px}

/* scripts section */
.scripts-hdr{font-size:15px;font-weight:700;color:#fff;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:8px}
.scripts-cnt{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,107,53,.1);color:#ff6b35;font-weight:600}
.script-card{background:#1a1a1a;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #2a2a2a;transition:border-color .15s}
.script-card:focus-within{border-color:#3a3a3a}
.script-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.script-num{font-size:10px;font-weight:700;color:#ff6b35;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.2);padding:2px 8px;border-radius:5px;flex-shrink:0}
.script-name{font-size:13px;font-weight:600;color:#fff;flex:1;min-width:0}
.script-stat{background:#111;border:1px solid #333;border-radius:6px;color:#ccc;padding:3px 8px;font-size:11px;cursor:pointer;flex-shrink:0}
.script-stat:focus{outline:none;border-color:#555}
.script-field{margin-bottom:8px}
.script-lbl{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.script-ta{width:100%;background:#0f0f0f;border:1px solid #222;border-radius:8px;color:#ddd;padding:9px 12px;font-size:13px;line-height:1.55;resize:none;font-family:inherit;overflow:hidden;min-height:48px;transition:border-color .15s}
.script-ta:focus{outline:none;border-color:#444;color:#eee}
.script-meta{font-size:10px;color:#3a3a3a;margin-top:6px}
.scripts-sep{border:none;border-top:1px solid #2a2a2a;margin:24px 0}
.kanban-hdr{font-size:13px;font-weight:700;color:#555;margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}

/* discussion tab */
.disc-wrap{display:flex;flex-direction:column;height:calc(100vh - 120px);max-width:680px;margin:0 auto;padding:0 20px}
.disc-feed{flex:1;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:12px}
.disc-msg{background:#1a1a1a;border-radius:12px;padding:14px}
.disc-msg-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.disc-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.disc-name{font-size:13px;font-weight:700}
.disc-time{font-size:11px;color:#444;margin-left:auto}
.disc-text{font-size:14px;color:#ddd;line-height:1.6;white-space:pre-wrap}
.disc-reply-btn{margin-top:8px;font-size:11px;color:#555;background:none;border:none;cursor:pointer;padding:0}
.disc-reply-btn:hover{color:#aaa}
.disc-compose{border-top:1px solid #2a2a2a;padding:12px 0;display:flex;gap:8px;align-items:flex-end}
.disc-input{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#e8e8e8;padding:10px 14px;font-size:14px;resize:none;height:44px;transition:height .15s;font-family:inherit;line-height:1.5}
.disc-input:focus{outline:none;border-color:#444;height:90px}
.disc-send{padding:10px 18px;border-radius:10px;border:none;background:#ff6b35;color:#fff;cursor:pointer;font-weight:600;font-size:14px;height:44px;white-space:nowrap}
.disc-send:disabled{opacity:.4;cursor:default}
.disc-empty{color:#444;text-align:center;padding:40px 0;font-size:14px}

@media(max-width:500px){
  .grid{grid-template-columns:1fr;padding:10px}
  .picker-users{flex-direction:column;align-items:center}
  .plan-card{flex-direction:column}
  .plan-thumb{width:100%;height:160px}
  .hrow1{gap:6px}
  .stats{display:none}
}
</style>
</head>
<body>

<!-- User Picker -->
<div class="picker-overlay" id="picker">
  <div class="picker-box">
    <div class="picker-logo">UBuyer <span>Контент Завод</span></div>
    <div class="picker-sub">Выбери себя, чтобы начать</div>
    <div class="picker-users">
      <div class="picker-user" onclick="selectUser('timur')">
        <div class="picker-avatar" style="background:#ff6b35">Т</div>
        <div class="picker-name">Тимур</div>
      </div>
      <div class="picker-user" onclick="selectUser('nikita')">
        <div class="picker-avatar" style="background:#3b82f6">Н</div>
        <div class="picker-name">Никита</div>
      </div>
      <div class="picker-user" onclick="selectUser('roma')">
        <div class="picker-avatar" style="background:#22c55e">Р</div>
        <div class="picker-name">Рома</div>
      </div>
      <div class="picker-user" onclick="selectUser('serega')">
        <div class="picker-avatar" style="background:#a855f7">С</div>
        <div class="picker-name">Серега</div>
      </div>
    </div>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <header>
    <div class="hrow1">
      <div class="logo">UBuyer <span>Завод</span></div>
      <div class="tabs">
        <button class="tab-btn active" id="tab-review" onclick="switchTab('review')">Ревью</button>
        <button class="tab-btn" id="tab-plan" onclick="switchTab('plan')">Контент-план</button>
        <button class="tab-btn" id="tab-disc" onclick="switchTab('disc')">Обсуждение</button>
      </div>
      <div class="session-badge" id="session-date">—</div>
      <div class="stats">
        <div class="stat">Видео: <strong id="cnt-total">0</strong></div>
        <div class="stat">Берём: <strong id="cnt-approved">0</strong></div>
      </div>
      <div class="ml-auto">
        <button class="btn-add" id="btn-add-video" onclick="openAddModal()">+ Добавить</button>
        <div class="user-avatar" id="my-avatar" onclick="resetUser()"></div>
        <span class="change-user" onclick="resetUser()">сменить</span>
      </div>
    </div>
    <div class="hrow2" id="review-filters">
      <div class="filters">
        <button class="btn-f active" data-f="all">Все</button>
        <button class="btn-f" data-f="topic">🎯 Тема</button>
        <button class="btn-f" data-f="format">🎬 Формат</button>
        <button class="btn-f" data-f="manual">✋ Вручную</button>
        <button class="btn-f" data-f="approved">✓ Берём</button>
        <button class="btn-f" data-f="maybe">? Вопрос</button>
        <button class="btn-f" data-f="new">Не просмотрено</button>
        <button class="btn-f" data-f="consensus">🔥 Консенсус</button>
      </div>
      <div class="divider"></div>
      <div id="tag-filters"></div>
    </div>
  </header>

  <div id="view-review"><div class="grid" id="grid"></div></div>

  <div id="view-plan" style="display:none">
    <div class="plan-wrap">
      <div id="scripts-wrap"></div>
      <div id="kanban-wrap"></div>
    </div>
  </div>

  <div id="view-disc" style="display:none">
    <div class="disc-wrap">
      <div class="disc-feed" id="disc-feed"></div>
      <div class="disc-compose">
        <textarea class="disc-input" id="disc-input" placeholder="Напиши вопрос или сообщение…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendDiscMsg()}"></textarea>
        <button class="disc-send" onclick="sendDiscMsg()">→</button>
      </div>
    </div>
  </div>
</div>

<!-- Comment Modal -->
<div class="modal-overlay" id="comment-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-video-title"></div>
      <button class="modal-close" onclick="closeComments()">✕</button>
    </div>
    <div class="comments-list" id="comments-list"></div>
    <div class="comment-form">
      <textarea class="comment-input" id="comment-input" placeholder="Напиши комментарий…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendComment()}"></textarea>
      <button class="comment-send" id="comment-send" onclick="sendComment()">→</button>
    </div>
  </div>
</div>

<!-- Add Video Modal -->
<div class="add-overlay" id="add-modal">
  <div class="add-box">
    <h3>+ Добавить видео</h3>
    <div class="field">

let me = null, sessionId = null;
let sessionVideos = [], manualVideos = [];
let votes = {}, commentCounts = {}, videoTags = {}, contentPlan = {};
let scripts = {};
let currentFilter = 'all', tagFilter = null, currentTab = 'review';
let commentVideoId = null;
let commentsUnsub = null, votesUnsub = null, manualUnsub = null, tagsUnsub = null, planUnsub = null, discUnsub = null, scriptUnsub = null;
const scriptDebounces = {};
let addVideoData = null;

// ── User ──────────────────────────────────────────────────────────────────────
function selectUser(uid) {
  me = uid;
  localStorage.setItem('ubuyer_me', uid);
  document.getElementById('picker').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const u = USERS[uid];
  const av = document.getElementById('my-avatar');
  av.textContent = u.initial;
  av.style.background = u.color;
  renderTagFilters();
  loadLatestSession();
  subscribeDiscussion();
}

function resetUser() {
  me = null;
  localStorage.removeItem('ubuyer_me');
  [votesUnsub, manualUnsub, tagsUnsub, planUnsub, discUnsub, scriptUnsub].forEach(u => u && u());
  document.getElementById('app').style.display = 'none';
  document.getElementById('picker').style.display = 'flex';
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ['review','plan','disc'].forEach(t => {
    document.getElementById('view-' + t).style.display = t === tab ? 'block' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  document.getElementById('review-filters').style.display = tab === 'review' ? 'flex' : 'none';
  document.getElementById('btn-add-video').style.display = tab === 'disc' ? 'none' : 'inline-block';
  if (tab === 'plan') renderPlan();
  if (tab === 'disc') scrollDiscToBottom();
}

// ── Tag filters ────────────────────────────────────────────────────────────────
function renderTagFilters() {
  document.getElementById('tag-filters').innerHTML = ALL_TAGS.map(t =>
    `<button class="btn-tag-f ${tagFilter===t?'on':''}" onclick="toggleTagFilter('${t}')">${t}</button>`
  ).join('');
}
function toggleTagFilter(tag) {
  tagFilter = tagFilter === tag ? null : tag;
  renderTagFilters();
  renderGrid();
}

// ── Session ────────────────────────────────────────────────────────────────────
async function loadLatestSession() {
  let snap = await db.collection('sessions').orderBy('createdAt','desc').limit(1).get();
  if (snap.empty) {
    // Создаём пустую сессию чтобы ручное добавление работало всегда
    const ref = await db.collection('sessions').add({
      videos: [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    sessionId = ref.id;
    sessionVideos = [];
  } else {
    const doc = snap.docs[0];
    sessionId = doc.id;
    sessionVideos = doc.data().videos || [];
  }
  document.getElementById('session-date').textContent = 'Сессия ' + sessionId;
  updateTotalCount();
  subscribeManualVideos();
  subscribeVotes();
  subscribeCommentCounts();
  subscribeVideoTags();
  subscribeContentPlan();
  await seedScriptsIfEmpty();
  subscribeScripts();
}

function allVideos() { return [...sessionVideos, ...manualVideos]; }

function updateTotalCount() {
  document.getElementById('cnt-total').textContent = allVideos().length;
}

// ── Subscriptions ──────────────────────────────────────────────────────────────
function subscribeManualVideos() {
  if (manualUnsub) manualUnsub();
  manualUnsub = db.collection('sessions').doc(sessionId)
    .collection('manualVideos').orderBy('addedAt','desc')
    .onSnapshot(snap => {
      manualVideos = snap.docs.map(d => ({ ...d.data(), id: d.id, isManual: true }));
      updateTotalCount();
      renderGrid();
      if (currentTab === 'plan') renderPlan();
    });
}

function subscribeVotes() {
  if (votesUnsub) votesUnsub();
  votesUnsub = db.collection('sessions').doc(sessionId)
    .collection('votes')
    .onSnapshot(snap => {
      snap.docChanges().forEach(ch => {
        if (ch.type === 'removed') delete votes[ch.doc.id];
        else votes[ch.doc.id] = ch.doc.data();
      });
      renderGrid();
      updateApprovedCount();
      if (currentTab === 'plan') renderPlan();
    });
}

function subscribeCommentCounts() {
  db.collection('sessions').doc(sessionId)
    .collection('commentCounts')
    .onSnapshot(snap => {
      snap.docs.forEach(d => { commentCounts[d.id] = d.data().count || 0; });
      renderGrid();
    });
}

function subscribeVideoTags() {
  if (tagsUnsub) tagsUnsub();
  tagsUnsub = db.collection('sessions').doc(sessionId)
    .collection('videoTags')
    .onSnapshot(snap => {
      snap.docs.forEach(d => { videoTags[d.id] = d.data().tags || []; });
      renderGrid();
    });
}

function subscribeContentPlan() {
  if (planUnsub) planUnsub();
  planUnsub = db.collection('contentPlan')
    .onSnapshot(snap => {
      snap.docs.forEach(d => { contentPlan[d.id] = d.data(); });
      if (currentTab === 'plan') renderPlan();
    });
}

function subscribeDiscussion() {
  if (discUnsub) discUnsub();
  discUnsub = db.collection('discussions')
    .orderBy('createdAt','asc')
    .onSnapshot(snap => renderDiscussion(snap.docs));
}

// ── Votes ──────────────────────────────────────────────────────────────────────
async function setVote(videoId, status) {
  const ref = db.collection('sessions').doc(sessionId).collection('votes').doc(videoId);
  const current = (votes[videoId] || {})[me];
  const next = current === status ? null : status;
  await ref.set({ [me]: next, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
}

// ── Tags ───────────────────────────────────────────────────────────────────────
async function toggleTag(videoId, tag) {
  const current = videoTags[videoId] || [];
  const next = current.includes(tag) ? current.filter(t => t !== tag) : [...current, tag];
  await db.collection('sessions').doc(sessionId).collection('videoTags').doc(videoId).set({ tags: next });
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function fmtViews(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return Math.round(n/1e3) + 'K';
  return n || '—';
}
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('ru-RU', { day:'numeric', month:'short' });
}
function fmtDur(s) {
  if (!s) return '';
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}
function viewsCls(v) { return v >= 500000 ? 'viral' : v >= 100000 ? 'hot' : ''; }
function getMyVote(vid) { return (votes[vid] || {})[me] || null; }
function getApproveCount(vid) { return Object.values(votes[vid] || {}).filter(s => s === 'approved').length; }
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function escAttr(s) { return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

function updateApprovedCount() {
  document.getElementById('cnt-approved').textContent =
    allVideos().filter(v => getMyVote(v.id) === 'approved').length;
}

// ── Grid render ────────────────────────────────────────────────────────────────
function filterVideos() {
  return allVideos().filter(v => {
    const my = getMyVote(v.id);
    const tags = videoTags[v.id] || [];
    if (tagFilter && !tags.includes(tagFilter)) return false;
    if (currentFilter === 'topic')     return v.refType === 'topic';
    if (currentFilter === 'format')    return v.refType === 'format';
    if (currentFilter === 'manual')    return v.isManual;
    if (currentFilter === 'approved')  return my === 'approved';
    if (currentFilter === 'maybe')     return my === 'maybe';
    if (currentFilter === 'new')       return !my;
    if (currentFilter === 'consensus') return getApproveCount(v.id) >= 2;
    return true;
  });
}

function renderGrid() {
  const list = filterVideos();
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty">Нет видео в этой категории</div>';
    return;
  }
  grid.innerHTML = list.map(v => {
    const my = getMyVote(v.id);
    const vv = votes[v.id] || {};
    const cCount = commentCounts[v.id] || 0;
    const tags = videoTags[v.id] || [];

    const voterChips = Object.entries(USERS).map(([uid, u]) => {
      const st = vv[uid] || null;
      const lbl = st === 'approved' ? '✓' : st === 'maybe' ? '?' : st === 'skip' ? '✗' : '·';
      return `<span class="v-chip ${st||'none'} ${st?'active':''}" title="${u.name}: ${st||'не голосовал'}">${u.initial} ${lbl}</span>`;
    }).join('');

    const tagPills = ALL_TAGS.map(t =>
      `<span class="tag-pill ${tags.includes(t)?'on':''}" onclick="toggleTag('${v.id}','${t}')">${t}</span>`
    ).join('');

    const refHtml = v.isManual
      ? `<span class="ref-type ref-manual">✋ Вручную</span>`
      : v.refType === 'topic'
        ? `<span class="ref-type ref-topic">🎯 Тема</span>`
        : `<span class="ref-type ref-format">🎬 Формат</span>`;

    const badgeHtml = v.isManual
      ? `<span class="thumb-badge badge-manual">${detectPlatformLabel(v.shortsUrl||v.url||'')}</span>`
      : `<span class="thumb-badge badge-shorts">Shorts</span>`;

    const videoUrl = v.shortsUrl || v.url || '#';
    const isIg = (v.refType === 'instagram') || (v.platform === 'instagram');
    const thumbHtml = (v.thumbnail && !isIg)
      ? `<img src="${escAttr(v.thumbnail)}" alt="" loading="lazy">`
      : isIg
        ? `<div class="thumb-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg><span>Instagram Reel</span></div>`
        : `<img src="${escAttr(v.thumbnail||'')}" alt="" loading="lazy">`;

    return `<div class="card" data-my="${my||''}" id="card-${v.id}">
      <div class="thumb" onclick="window.open('${escAttr(videoUrl)}','_blank')">
        ${thumbHtml}
        ${badgeHtml}
        ${v.durationSec ? `<span class="thumb-dur">${fmtDur(v.durationSec)}</span>` : ''}
      </div>
      <div class="card-body">
        ${refHtml}
        <div class="card-title">${escHtml(v.title)}</div>
        <div class="card-meta">
          <span>${v.channel ? escHtml(v.channel) + ' · ' : ''}${fmtDate(v.publishedAt)}</span>
          ${v.views ? `<span class="card-views ${viewsCls(v.views)}">${fmtViews(v.views)}</span>` : ''}
        </div>
        <div class="voters">${voterChips}</div>
        <div class="vote-row">
          <button class="btn-vote btn-approved ${my==='approved'?'mine':''}" onclick="setVote('${v.id}','approved')">✓ Берём</button>
          <button class="btn-vote btn-maybe ${my==='maybe'?'mine':''}" onclick="setVote('${v.id}','maybe')">? Вопрос</button>
          <button class="btn-vote btn-skip ${my==='skip'?'mine':''}" onclick="setVote('${v.id}','skip')">✗ Пропуск</button>
          <a class="btn-yt" href="${escAttr(videoUrl)}" target="_blank">▶</a>
        </div>
        <div class="card-tags">${tagPills}</div>
        <button class="btn-comment" onclick="openComments('${v.id}','${escAttr(v.title||'')}')">
          <span class="comment-dot ${cCount>0?'has':''}"></span>
          ${cCount>0 ? cCount+' комментари'+(cCount===1?'й':'я/ев') : 'Добавить комментарий'}

    </div>`;

// ── Content Plan ───────────────────────────────────────────────────────────────
async function updatePlanStatus(videoId, field, value) {
  await db.collection('contentPlan').doc(videoId)
    .set({ [field]: value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
}

function renderPlan() {
  renderScriptsSection();
  renderKanban();
}

// ── Scripts ────────────────────────────────────────────────────────────────────
async function seedScriptsIfEmpty() {
  const snap = await db.collection('scripts').limit(1).get();
  if (!snap.empty) return;
  const batch = db.batch();
  SCRIPTS_DATA.forEach(s => {
    batch.set(db.collection('scripts').doc(s.id), {
      ...s,
      status: 'idea',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  });
  await batch.commit();
}

function subscribeScripts() {
  if (scriptUnsub) scriptUnsub();
  scriptUnsub = db.collection('scripts').orderBy('order').onSnapshot(snap => {
    snap.docs.forEach(d => { scripts[d.id] = { id: d.id, ...d.data() }; });
    if (currentTab === 'plan') {
      const wrap = document.getElementById('scripts-wrap');
      if (wrap && wrap.querySelector('.script-card')) refreshScripts();
      else renderScriptsSection();
    }
  });
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function escTa(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderScriptCard(s) {
  const u = s.updatedBy ? USERS[s.updatedBy] : null;
  const ts = s.updatedAt?.toDate?.();
  const timeStr = ts ? ts.toLocaleString('ru-RU', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
  const metaStr = u && ts ? `${u.name} · ${timeStr}` : '';
  const statusOpts = PLAN_STATUSES.map(st =>
    `<option value="${STATUS_KEY[st]}" ${(s.status||'idea')===STATUS_KEY[st]?'selected':''}>${st}</option>`
  ).join('');
  return `<div class="script-card">
    <div class="script-head">
      <span class="script-num">${escHtml(s.num)}</span>
      <span class="script-name">${escHtml(s.title)}</span>
      <select class="script-stat" onchange="updateScriptStatus('${s.id}',this.value)">${statusOpts}</select>
    </div>
    <div class="script-field">
      <div class="script-lbl">Хук</div>
      <textarea id="sf_${s.id}_hook" class="script-ta"
        oninput="onScriptInput('${s.id}','hook',this)"
        onblur="flushScript('${s.id}','hook',this)">${escTa(s.hook||'')}</textarea>
    </div>
    <div class="script-field">
      <div class="script-lbl">Зацеп</div>
      <textarea id="sf_${s.id}_zatcep" class="script-ta"
        oninput="onScriptInput('${s.id}','zatcep',this)"
        onblur="flushScript('${s.id}','zatcep',this)">${escTa(s.zatcep||'')}</textarea>
    </div>
    <div class="script-meta" id="sm_${s.id}">${metaStr ? 'Изменил: ' + metaStr : ''}</div>
  </div>`;
}

function renderScriptsSection() {
  const scriptsList = Object.values(scripts).sort((a,b) => (a.order||0)-(b.order||0));
  const wrap = document.getElementById('scripts-wrap');
  if (!wrap) return;
  wrap.innerHTML = `
    <div class="scripts-hdr">Сценарии <span class="scripts-cnt">${scriptsList.length}</span></div>
    ${scriptsList.map(s => renderScriptCard(s)).join('')}
    <hr class="scripts-sep">
  `;
  wrap.querySelectorAll('.script-ta').forEach(ta => autoResize(ta));
}

function refreshScripts() {
  Object.values(scripts).forEach(s => {
    ['hook','zatcep'].forEach(field => {
      const el = document.getElementById(`sf_${s.id}_${field}`);
      if (el && document.activeElement !== el) {
        el.value = s[field] || '';
        autoResize(el);
      }
    });
    const meta = document.getElementById(`sm_${s.id}`);
    if (meta) {
      const u = s.updatedBy ? USERS[s.updatedBy] : null;
      const ts = s.updatedAt?.toDate?.();
      const timeStr = ts ? ts.toLocaleString('ru-RU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      meta.textContent = u && ts ? `Изменил: ${u.name} · ${timeStr}` : '';
    }
  });
}

function onScriptInput(id, field, el) {
  autoResize(el);
  clearTimeout(scriptDebounces[id + '_' + field]);
  scriptDebounces[id + '_' + field] = setTimeout(() => saveScriptField(id, field, el.value), 800);
}

function flushScript(id, field, el) {
  clearTimeout(scriptDebounces[id + '_' + field]);
  saveScriptField(id, field, el.value);
}

async function saveScriptField(id, field, value) {
  await db.collection('scripts').doc(id).set(
    { [field]: value, updatedBy: me, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
    { merge: true }
  );
}

async function updateScriptStatus(id, status) {
  await db.collection('scripts').doc(id).set(
    { status, updatedBy: me, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
    { merge: true }
  );
}

function renderKanban() {
  const approved = allVideos().filter(v => getApproveCount(v.id) >= 1);
  const wrap = document.getElementById('kanban-wrap');
  if (!wrap) return;
  if (!approved.length) { wrap.innerHTML = ''; return; }
  const grouped = {};
  PLAN_STATUSES.forEach(s => { grouped[s] = []; });
  approved.forEach(v => {
    const plan = contentPlan[v.id] || {};
    const status = STATUS_LABEL[plan.status] || 'Идея';
    (grouped[status] = grouped[status] || []).push({ v, plan });
  });
  wrap.innerHTML = `<div class="kanban-hdr">Референсы в работе</div>` + PLAN_STATUSES.map(status => {
    const items = grouped[status] || [];
    const cardsHtml = items.length ? items.map(({ v, plan }) => {
      const videoUrl = v.shortsUrl || v.url || '#';
      const statusOpts = PLAN_STATUSES.map(s =>
        `<option value="${STATUS_KEY[s]}" ${(plan.status||'idea')===STATUS_KEY[s]?'selected':''}>${s}</option>`
      ).join('');
      const shooterOpts = [['','Кто снимает?'],['timur','Тимур'],['nikita','Никита'],['roma','Рома']].map(([val,lbl]) =>
        `<option value="${val}" ${(plan.shooter||'')===val?'selected':''}>${lbl}</option>`
      ).join('');
      return `<div class="plan-card">
        <img class="plan-thumb" src="${escAttr(v.thumbnail||'')}" alt="" onclick="window.open('${escAttr(videoUrl)}','_blank')">
        <div class="plan-info">
          <div class="plan-title" title="${escAttr(v.title||'')}">${escHtml(v.title)}</div>
          <div class="plan-row">
            <select class="plan-sel" onchange="updatePlanStatus('${v.id}','status',this.value)">${statusOpts}</select>
            <select class="plan-sel" onchange="updatePlanStatus('${v.id}','shooter',this.value)">${shooterOpts}</select>
            <input class="plan-date" type="date" value="${plan.shootDate||''}"
              onchange="updatePlanStatus('${v.id}','shootDate',this.value)" title="Дата съёмки">
          </div>
        </div>
      </div>`;
    }).join('') : '<div class="plan-empty">Пусто</div>';
    return `<div class="plan-col">
      <div class="plan-col-hdr">
        <span class="plan-col-label">${status}</span>
        <span class="plan-cnt ${CNT_CLS[status]}">${items.length}</span>
      </div>
      ${cardsHtml}
    </div>`;
  }).join('');
}

// ── Discussion ─────────────────────────────────────────────────────────────────
function renderDiscussion(docs) {
  const feed = document.getElementById('disc-feed');
  if (!docs.length) {
    feed.innerHTML = '<div class="disc-empty">Пока тихо.<br>Задай первый вопрос команде.</div>';
    return;
  }
  const wasAtBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60;
  feed.innerHTML = docs.map(d => {
    const data = d.data();
    const u = USERS[data.author] || { name: data.author, color: '#888', initial: '?' };
    const ts = data.createdAt?.toDate?.();
    const time = ts ? ts.toLocaleString('ru-RU', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
    return `<div class="disc-msg">
      <div class="disc-msg-header">
        <div class="disc-avatar" style="background:${u.color}">${u.initial}</div>
        <span class="disc-name" style="color:${u.color}">${u.name}</span>
        <span class="disc-time">${time}</span>
      </div>
      <div class="disc-text">${escHtml(data.text)}</div>
      <button class="disc-reply-btn" onclick="replyTo('${escAttr(u.name)}')">↩ ответить</button>
    </div>`;
  }).join('');
  if (wasAtBottom) scrollDiscToBottom();
}

function scrollDiscToBottom() {
  const feed = document.getElementById('disc-feed');
  setTimeout(() => { feed.scrollTop = feed.scrollHeight; }, 50);
}

function replyTo(name) {
  const input = document.getElementById('disc-input');
  input.value = '@' + name + ': ';
  input.focus();
  input.style.height = '90px';
}

async function sendDiscMsg() {
  const input = document.getElementById('disc-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '44px';
  await db.collection('discussions').add({
    author: me,
    text,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

// ── Comments ───────────────────────────────────────────────────────────────────
function openComments(videoId, title) {
  commentVideoId = videoId;
  document.getElementById('modal-video-title').textContent = title;
  document.getElementById('comment-input').value = '';
  document.getElementById('comment-modal').classList.add('open');
  if (commentsUnsub) commentsUnsub();
  commentsUnsub = db.collection('sessions').doc(sessionId)
    .collection('comments').doc(videoId).collection('items')
    .orderBy('createdAt','asc')
    .onSnapshot(snap => renderComments(snap.docs));
}

function renderComments(docs) {
  const list = document.getElementById('comments-list');
  if (!docs.length) { list.innerHTML = '<div class="no-comments">Комментариев пока нет</div>'; return; }
  list.innerHTML = docs.map(d => {
    const data = d.data();
    const u = USERS[data.author] || {};
    const ts = data.createdAt?.toDate?.();
    const time = ts ? ts.toLocaleString('ru-RU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="comment-item">
      <div class="comment-author" style="color:${u.color||'#aaa'}">${u.name||data.author}</div>
      <div class="comment-text">${escHtml(data.text)}</div>
      <div class="comment-time">${time}</div>
    </div>`;
  }).join('');
  list.scrollTop = list.scrollHeight;
}

async function sendComment() {
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text || !commentVideoId) return;
  const btn = document.getElementById('comment-send');
  btn.disabled = true;
  const batch = db.batch();
  const itemRef = db.collection('sessions').doc(sessionId)
    .collection('comments').doc(commentVideoId).collection('items').doc();
  batch.set(itemRef, { author: me, text, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  const countRef = db.collection('sessions').doc(sessionId).collection('commentCounts').doc(commentVideoId);
  batch.set(countRef, { count: firebase.firestore.FieldValue.increment(1) }, { merge: true });
  await batch.commit();
  input.value = '';
  btn.disabled = false;
  input.style.height = '40px';
}

function closeComments() {
  document.getElementById('comment-modal').classList.remove('open');
  if (commentsUnsub) { commentsUnsub(); commentsUnsub = null; }
  commentVideoId = null;
}

// ── Manual Add Video ───────────────────────────────────────────────────────────
function detectPlatform(url) {
  if (/youtube\.com|youtu\.be/.test(url)) return 'youtube';
  if (/tiktok\.com/.test(url)) return 'tiktok';
  if (/instagram\.com/.test(url)) return 'instagram';
  return 'other';
}
function detectPlatformLabel(url) {
  return { youtube:'YouTube', tiktok:'TikTok', instagram:'Instagram', other:'Видео' }[detectPlatform(url)];
}
function extractYouTubeId(url) {
  const m = url.match(/(?:shorts\/|v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

let urlDebounce = null;
async function onUrlInput(url) {
  clearTimeout(urlDebounce);
  const saveBtn = document.getElementById('add-save');
  const hintEl = document.getElementById('plat-hint');
  const previewEl = document.getElementById('add-preview');
  addVideoData = null;
  saveBtn.disabled = true;
  if (!url.trim()) { hintEl.innerHTML = ''; previewEl.style.display = 'none'; return; }

  const platform = detectPlatform(url);
  const platCls = { youtube:'plat-yt', tiktok:'plat-tt', instagram:'plat-ig', other:'plat-other' };
  const platLabel = { youtube:'YouTube', tiktok:'TikTok', instagram:'Instagram', other:'Другое' };
  hintEl.className = 'plat-hint ' + platCls[platform];
  hintEl.textContent = platLabel[platform];

  urlDebounce = setTimeout(async () => {
    if (platform === 'youtube') {
      const videoId = extractYouTubeId(url);
      if (!videoId) return;
      const thumbnail = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
      let title = '', channel = '';
      try {
        const r = await fetch(`https://www.youtube.com/oembed?url=https://youtu.be/${videoId}&format=json`);
        if (r.ok) { const d = await r.json(); title = d.title; channel = d.author_name; }
      } catch {}
      document.getElementById('add-thumb').src = thumbnail;
      document.getElementById('add-preview-title').textContent = title || 'YouTube видео';
      if (title) document.getElementById('add-title').value = title;
      previewEl.style.display = 'block';
      addVideoData = { title, thumbnail, channel, shortsUrl: url, platform, refType: 'manual',
        views: 0, durationSec: 0, publishedAt: new Date().toISOString() };
    } else {
      previewEl.style.display = 'none';
      addVideoData = { title: '', thumbnail: '', channel: '', shortsUrl: url, platform,
        refType: 'manual', views: 0, durationSec: 0, publishedAt: new Date().toISOString() };
    }
    saveBtn.disabled = false;
  }, 500);
}

function openAddModal() {
  document.getElementById('add-url').value = '';
  document.getElementById('add-title').value = '';
  document.getElementById('plat-hint').textContent = '';
  document.getElementById('add-preview').style.display = 'none';
  document.getElementById('add-save').disabled = true;
  addVideoData = null;
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('add-url').focus(), 100);
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}

async function saveManualVideo() {
  if (!addVideoData || !sessionId) return;
  const title = document.getElementById('add-title').value.trim() || addVideoData.title;
  if (!title) { document.getElementById('add-title').focus(); return; }
  const btn = document.getElementById('add-save');
  btn.disabled = true;
  const docId = 'manual_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  await db.collection('sessions').doc(sessionId).collection('manualVideos').doc(docId).set({
    ...addVideoData,
    title,
    isManual: true,
    addedBy: me,
    addedAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
  closeAddModal();
  btn.disabled = false;
}

// ── Filter buttons ─────────────────────────────────────────────────────────────
document.querySelectorAll('.btn-f').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn-f').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.f;
    renderGrid();
  });
});

document.getElementById('comment-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeComments();
});
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAddModal();
});

// ── Init ───────────────────────────────────────────────────────────────────────
const saved = localStorage.getItem('ubuyer_me');
if (saved && USERS[saved]) selectUser(saved);
else document.getElementById('picker').style.display = 'flex';
</script>
